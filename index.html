<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 스케줄러</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0e0e12; --surface: #16161e; --surface2: #1e1e2a;
    --border: #2a2a3a; --accent: #7c6af7; --accent2: #f26abe;
    --accent3: #4ecdc4; --text: #e8e8f0; --text-dim: #7a7a9a;
    --red: #f26a6a; --yellow: #f2c86a; --green: #6af2a0;
    --gold: #f2d06a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; display:flex; flex-direction:column; }

  /* ── AUTH SCREEN ── */
  #authScreen {
    position: fixed; inset:0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%; max-width: 380px;
    display: flex; flex-direction: column; gap: 14px;
    text-align: center;
  }
  .auth-logo { font-family:'DM Mono',monospace; font-size:1.3rem; color:var(--accent); }
  .auth-logo span { color:var(--accent2); }
  .auth-tabs { display:flex; border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  .auth-tab { flex:1; padding:9px; background:none; border:none; color:var(--text-dim); font-family:'Noto Sans KR',sans-serif; font-size:0.85rem; cursor:pointer; transition:all 0.15s; }
  .auth-tab.active { background:var(--accent); color:white; }
  .auth-field { display:flex; flex-direction:column; gap:5px; text-align:left; }
  .auth-label { font-size:0.75rem; color:var(--text-dim); }
  .auth-input {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:10px; padding:11px 14px; color:var(--text);
    font-family:'Noto Sans KR',sans-serif; font-size:0.9rem; outline:none;
    transition:border-color 0.15s;
  }
  .auth-input:focus { border-color:var(--accent); }
  .auth-btn {
    background:var(--accent); border:none; border-radius:10px;
    padding:12px; color:white; font-family:'Noto Sans KR',sans-serif;
    font-size:0.95rem; font-weight:500; cursor:pointer; transition:background 0.15s; margin-top:4px;
  }
  .auth-btn:hover { background:#6a58e0; }
  .auth-btn:disabled { opacity:0.5; cursor:not-allowed; }
  .auth-msg { font-size:0.78rem; min-height:18px; }
  .auth-msg.err { color:var(--red); }
  .auth-msg.ok  { color:var(--green); }
  .auth-logout { background:none; border:1px solid var(--border); border-radius:8px; padding:5px 12px; color:var(--text-dim); font-size:0.78rem; cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:all 0.15s; }
  .auth-logout:hover { border-color:var(--red); color:var(--red); }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  header { padding:20px 32px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); background:var(--surface); position:sticky; top:0; z-index:100; }
  .logo { font-family:'DM Mono',monospace; font-size:1.1rem; color:var(--accent); }
  .logo span { color:var(--accent2); }
  .header-right { display:flex; align-items:center; gap:10px; }
  .today-badge { font-family:'DM Mono',monospace; font-size:0.78rem; color:var(--text-dim); background:var(--surface2); border:1px solid var(--border); padding:4px 12px; border-radius:20px; }
  .sync-indicator { font-family:'DM Mono',monospace; font-size:0.72rem; padding:4px 10px; border-radius:20px; border:1px solid var(--border); display:flex; align-items:center; gap:5px; transition:all 0.3s; }
  .sync-indicator.syncing { color:var(--yellow); border-color:var(--yellow); }
  .sync-indicator.synced  { color:var(--green);  border-color:var(--green); }
  .sync-indicator.error   { color:var(--red);    border-color:var(--red); }
  .sync-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }
  .syncing .sync-dot { animation:blink 0.8s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  main { flex:1; display:grid; grid-template-columns:280px 1fr 300px; height:calc(100vh - 65px); overflow:hidden; }

  /* ── LEFT: CALENDAR SIDEBAR ── */
  aside { background:var(--surface); border-right:1px solid var(--border); padding:24px; display:flex; flex-direction:column; gap:24px; overflow-y:auto; }
  .cal-nav { display:flex; align-items:center; justify-content:space-between; }
  .cal-nav button { background:none; border:1px solid var(--border); color:var(--text-dim); width:28px; height:28px; border-radius:6px; cursor:pointer; font-size:0.85rem; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
  .cal-nav button:hover { border-color:var(--accent); color:var(--accent); }
  .cal-month { font-weight:500; font-size:0.95rem; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
  .cal-day-label { text-align:center; font-family:'DM Mono',monospace; font-size:0.65rem; color:var(--text-dim); padding:4px 0 8px; }
  .cal-cell { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:6px; font-size:0.78rem; cursor:pointer; transition:all 0.15s; position:relative; color:var(--text-dim); font-family:'DM Mono',monospace; }
  .cal-cell:hover { background:var(--surface2); color:var(--text); }
  .cal-cell.today { color:var(--accent); font-weight:700; }
  .cal-cell.today::after { content:''; position:absolute; bottom:3px; width:4px; height:4px; border-radius:50%; background:var(--accent); }
  .cal-cell.selected { background:var(--accent); color:white; }
  .cal-cell.selected::after { display:none; }
  .cal-cell.has-tasks::before { content:''; position:absolute; top:3px; right:3px; width:5px; height:5px; border-radius:50%; background:var(--accent2); }
  .cal-cell.selected.has-tasks::before { background:white; }
  .cal-cell.other-month { opacity:0.3; }

  .stats-row { display:flex; gap:8px; }
  .stat-chip { flex:1; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px; text-align:center; }
  .stat-num { font-family:'DM Mono',monospace; font-size:1.4rem; font-weight:500; display:block; }
  .stat-num.accent { color:var(--accent); } .stat-num.green { color:var(--green); } .stat-num.yellow { color:var(--yellow); }
  .stat-label { font-size:0.65rem; color:var(--text-dim); margin-top:2px; display:block; }

  /* ── CENTER: TASKS ── */
  .content { display:flex; flex-direction:column; overflow:hidden; border-right:1px solid var(--border); }
  .content-header { padding:24px 32px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .selected-date-label { font-size:1.3rem; font-weight:500; }
  .selected-date-label span { font-family:'DM Mono',monospace; font-size:0.8rem; color:var(--text-dim); margin-left:10px; }

  .add-form { padding:16px 32px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:8px; flex-shrink:0; }
  .add-row { display:flex; gap:10px; }
  .input-wrap { flex:1; }
  .task-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 16px; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.15s; }
  .task-input:focus { border-color:var(--accent); }
  .task-input::placeholder { color:var(--text-dim); }
  .time-input { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; color:var(--text); font-family:'DM Mono',monospace; font-size:0.85rem; outline:none; cursor:pointer; width:110px; }
  .priority-select { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 12px; color:var(--text); font-family:'Noto Sans KR',sans-serif; font-size:0.85rem; outline:none; cursor:pointer; }
  .priority-select option { background:var(--surface); }
  .add-btn { background:var(--accent); border:none; border-radius:10px; padding:10px 20px; color:white; font-family:'Noto Sans KR',sans-serif; font-size:0.9rem; font-weight:500; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
  .add-btn:hover { background:#6a58e0; transform:translateY(-1px); }
  .add-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

  .range-toggle-btn { background:none; border:1px solid var(--border); border-radius:10px; padding:10px 14px; color:var(--text-dim); font-size:0.82rem; cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:all 0.15s; white-space:nowrap; }
  .range-toggle-btn:hover { border-color:var(--accent2); color:var(--accent2); }
  .range-toggle-btn.active { border-color:var(--accent2); color:var(--accent2); background:rgba(242,106,190,0.08); }
  .range-row { display:none; gap:10px; align-items:center; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 14px; }
  .range-row.visible { display:flex; }
  .range-label { font-size:0.8rem; color:var(--text-dim); white-space:nowrap; }
  .date-input { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:6px 10px; color:var(--text); font-family:'DM Mono',monospace; font-size:0.82rem; outline:none; cursor:pointer; }
  .date-input:focus { border-color:var(--accent2); }
  .range-sep { color:var(--text-dim); font-size:0.8rem; }
  .range-btn { background:var(--accent2); border:none; border-radius:8px; padding:7px 16px; color:white; font-family:'Noto Sans KR',sans-serif; font-size:0.82rem; font-weight:500; cursor:pointer; transition:all 0.15s; white-space:nowrap; margin-left:auto; }
  .range-btn:hover { background:#e055a8; }
  .range-btn:disabled { opacity:0.5; cursor:not-allowed; }

  .filter-tabs { padding:12px 32px; display:flex; gap:8px; border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
  .tab { background:none; border:1px solid var(--border); border-radius:20px; padding:5px 14px; color:var(--text-dim); font-size:0.8rem; cursor:pointer; transition:all 0.15s; font-family:'Noto Sans KR',sans-serif; }
  .tab:hover { border-color:var(--accent); color:var(--accent); }
  .tab.active { background:var(--accent); border-color:var(--accent); color:white; }

  .task-list { flex:1; overflow-y:auto; padding:16px 32px; display:flex; flex-direction:column; gap:8px; }
  .task-list::-webkit-scrollbar { width:4px; }
  .task-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .task-item { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 16px; display:flex; align-items:center; gap:12px; transition:all 0.2s; animation:slideIn 0.2s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .task-item:hover { border-color:var(--accent); background:var(--surface2); }
  .task-item.done { opacity:0.5; }
  .task-item.is-range { border-left:3px solid var(--accent2); }
  .check-btn { width:22px; height:22px; border-radius:50%; border:2px solid var(--border); background:none; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.15s; font-size:0.7rem; color:white; }
  .check-btn:hover { border-color:var(--green); }
  .task-item.done .check-btn { background:var(--green); border-color:var(--green); }
  .priority-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .p-high { background:var(--red); } .p-mid { background:var(--yellow); } .p-low { background:var(--accent3); }
  .task-info { flex:1; min-width:0; }
  .task-title { font-size:0.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .task-item.done .task-title { text-decoration:line-through; color:var(--text-dim); }
  .task-meta { display:flex; align-items:center; gap:8px; margin-top:2px; }
  .task-time { font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--text-dim); }
  .range-badge { font-family:'DM Mono',monospace; font-size:0.68rem; color:var(--accent2); background:rgba(242,106,190,0.1); border:1px solid rgba(242,106,190,0.25); border-radius:4px; padding:1px 6px; }
  .task-actions { display:flex; gap:6px; opacity:0; transition:opacity 0.15s; }
  .task-item:hover .task-actions { opacity:1; }
  .action-btn { background:none; border:1px solid var(--border); border-radius:6px; width:26px; height:26px; color:var(--text-dim); cursor:pointer; font-size:0.75rem; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
  .action-btn:hover { border-color:var(--red); color:var(--red); }

  .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--text-dim); padding:60px; }
  .empty-state .icon { font-size:3rem; opacity:0.3; }
  .spinner { width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.6s linear infinite; display:inline-block; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* ── RIGHT: GRATITUDE JOURNAL ── */
  .gratitude-panel {
    background:var(--surface);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  .gratitude-header {
    padding:24px 20px 16px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }

  .gratitude-title {
    font-size:1rem;
    font-weight:500;
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:4px;
  }

  .gratitude-subtitle {
    font-family:'DM Mono',monospace;
    font-size:0.7rem;
    color:var(--text-dim);
  }

  .gratitude-date {
    font-family:'DM Mono',monospace;
    font-size:0.72rem;
    color:var(--gold);
    margin-top:2px;
  }

  .gratitude-add-area {
    padding:14px 20px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }

  .gratitude-input-wrap { display:flex; gap:8px; }

  .gratitude-input {
    flex:1;
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:9px 14px;
    color:var(--text);
    font-family:'Noto Sans KR',sans-serif;
    font-size:0.85rem;
    outline:none;
    transition:border-color 0.15s;
  }
  .gratitude-input:focus { border-color:var(--gold); }
  .gratitude-input::placeholder { color:var(--text-dim); }

  .gratitude-add-btn {
    background:var(--gold);
    border:none;
    border-radius:10px;
    padding:9px 14px;
    color:#1a1200;
    font-size:0.9rem;
    font-weight:700;
    cursor:pointer;
    transition:all 0.15s;
    flex-shrink:0;
  }
  .gratitude-add-btn:hover { background:#e8be50; transform:translateY(-1px); }
  .gratitude-add-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

  .gratitude-list {
    flex:1;
    overflow-y:auto;
    padding:14px 20px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .gratitude-list::-webkit-scrollbar { width:4px; }
  .gratitude-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .gratitude-item {
    background:var(--surface2);
    border:1px solid var(--border);
    border-left:3px solid var(--gold);
    border-radius:10px;
    padding:12px 14px;
    display:flex;
    align-items:flex-start;
    gap:10px;
    animation:slideIn 0.2s ease;
    transition:all 0.15s;
  }
  .gratitude-item:hover { border-color:var(--gold); }

  .gratitude-num {
    font-family:'DM Mono',monospace;
    font-size:1rem;
    flex-shrink:0;
    line-height:1;
    margin-top:1px;
  }

  .gratitude-text {
    flex:1;
    font-size:0.85rem;
    line-height:1.5;
    color:var(--text);
  }

  .gratitude-del {
    background:none; border:1px solid transparent; border-radius:6px;
    width:22px; height:22px; color:var(--text-dim); cursor:pointer;
    font-size:0.7rem; display:flex; align-items:center; justify-content:center;
    transition:all 0.15s; opacity:0; flex-shrink:0;
  }
  .gratitude-item:hover .gratitude-del { opacity:1; }
  .gratitude-del:hover { border-color:var(--red); color:var(--red); }

  .gratitude-empty {
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    color:var(--text-dim);
    padding:40px 20px;
    text-align:center;
  }
  .gratitude-empty .icon { font-size:2.5rem; opacity:0.3; }
  .gratitude-empty p { font-size:0.82rem; line-height:1.5; }

  .gratitude-streak {
    padding:12px 20px;
    border-top:1px solid var(--border);
    display:flex;
    align-items:center;
    gap:8px;
    flex-shrink:0;
  }
  .streak-label { font-size:0.75rem; color:var(--text-dim); }
  .streak-num { font-family:'DM Mono',monospace; font-size:0.9rem; color:var(--gold); font-weight:500; }

  @media (max-width:900px) {
    main { grid-template-columns:1fr; grid-template-rows:auto; height:auto; overflow:visible; }
    aside { height:auto; overflow:visible; }
    .content { height:auto; overflow:visible; }
    .task-list { overflow:visible; height:auto; }
    .gratitude-panel { height:auto; min-height:300px; border-left:none; border-top:1px solid var(--border); }
  }
  @media (max-width:700px) {
    .add-row { flex-wrap:wrap; }
    .time-input, .priority-select { flex:1; }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">my<span>//</span>scheduler</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin">로그인</button>
      <button class="auth-tab" id="tabSignup">회원가입</button>
    </div>
    <div class="auth-field">
      <label class="auth-label">이메일</label>
      <input class="auth-input" id="authEmail" type="email" placeholder="example@email.com">
    </div>
    <div class="auth-field">
      <label class="auth-label">비밀번호</label>
      <input class="auth-input" id="authPassword" type="password" placeholder="6자 이상">
    </div>
    <div class="auth-msg" id="authMsg"></div>
    <button class="auth-btn" id="authBtn">로그인</button>
  </div>
</div>

<header>
  <div class="logo">my<span>//</span>scheduler</div>
  <div class="header-right">
    <div class="sync-indicator syncing" id="syncIndicator">
      <div class="sync-dot"></div>
      <span id="syncText">연결 중</span>
    </div>
    <div class="today-badge" id="headerDate"></div>
    <a href="stats.html" style="background:none;border:1px solid var(--border);border-radius:8px;padding:5px 14px;color:var(--text-dim);font-size:0.8rem;cursor:pointer;text-decoration:none;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text-dim)'">📊 통계</a>
    <button class="auth-logout" id="logoutBtn">로그아웃</button>
  </div>
</header>

<main>
  <!-- LEFT: 캘린더 -->
  <aside>
    <div>
      <div class="cal-nav">
        <button id="prevMonth">‹</button>
        <div class="cal-month" id="calMonthLabel"></div>
        <button id="nextMonth">›</button>
      </div>
      <br>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="stats-row">
      <div class="stat-chip"><span class="stat-num accent" id="statTotal">0</span><span class="stat-label">전체</span></div>
      <div class="stat-chip"><span class="stat-num green"  id="statDone">0</span><span class="stat-label">완료</span></div>
      <div class="stat-chip"><span class="stat-num yellow" id="statLeft">0</span><span class="stat-label">남은</span></div>
    </div>
  </aside>

  <!-- CENTER: 할일 -->
  <div class="content">
    <div class="content-header">
      <div class="selected-date-label" id="selectedDateLabel">오늘 <span id="selectedDateSub"></span></div>
    </div>
    <div class="add-form">
      <div class="add-row">
        <div class="input-wrap">
          <input class="task-input" id="taskInput" type="text" placeholder="새 일정 추가... (Enter로 저장)" maxlength="80">
        </div>
        <input class="time-input" id="timeInput" type="time">
        <select class="priority-select" id="prioritySelect">
          <option value="low">🟢 낮음</option>
          <option value="mid" selected>🟡 보통</option>
          <option value="high">🔴 높음</option>
        </select>
        <button class="range-toggle-btn" id="rangeToggleBtn">📅 기간</button>
        <button class="add-btn" id="addBtn">+ 추가</button>
      </div>
      <div class="range-row" id="rangeRow">
        <span class="range-label">기간</span>
        <input class="date-input" id="rangeStart" type="date">
        <span class="range-sep">~</span>
        <input class="date-input" id="rangeEnd" type="date">

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmbHlkY2VxZ2F1YWFveWJrZ3h6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NTkxMDksImV4cCI6MjA4ODIzNTEwOX0.xhA8KRBAy04-PhPa-uJanGCfFC79aKMVFpOofAqO8Fc';   // ← 여기

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── AUTH (Supabase Email+Password) ───────────
let currentUser = null;

(function initAuth() {
  const screen   = document.getElementById('authScreen');
  const emailEl  = document.getElementById('authEmail');
  const passEl   = document.getElementById('authPassword');
  const btnEl    = document.getElementById('authBtn');
  const msgEl    = document.getElementById('authMsg');
  const tabLogin  = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  let mode = 'login';

  function setMode(m) {
    mode = m;
    tabLogin.classList.toggle('active', m === 'login');
    tabSignup.classList.toggle('active', m === 'signup');
    btnEl.textContent = m === 'login' ? '로그인' : '회원가입';
    msgEl.textContent = '';
    msgEl.className = 'auth-msg';
  }

  tabLogin.addEventListener('click', () => setMode('login'));
  tabSignup.addEventListener('click', () => setMode('signup'));

  async function doAuth() {
    const email = emailEl.value.trim();
    const pass  = passEl.value;
    if (!email || !pass) { showMsg('이메일과 비밀번호를 입력하세요.', 'err'); return; }
    btnEl.disabled = true;
    btnEl.textContent = '처리 중...';

    if (mode === 'login') {
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) { showMsg('이메일 또는 비밀번호가 틀렸습니다.', 'err'); }
      else { currentUser = data.user; screen.style.display = 'none'; onLoggedIn(); }
    } else {
      const { data, error } = await sb.auth.signUp({ email, password: pass });
      if (error) { showMsg(error.message, 'err'); }
      else if (data.user && data.user.identities && data.user.identities.length === 0) {
        showMsg('이미 가입된 이메일입니다.', 'err');
      } else {
        showMsg('가입 완료! 이메일 확인 후 로그인하세요.', 'ok');
        setMode('login');
      }
    }
    btnEl.disabled = false;
    btnEl.textContent = mode === 'login' ? '로그인' : '회원가입';
  }

  function showMsg(txt, type) {
    msgEl.textContent = txt;
    msgEl.className = 'auth-msg ' + type;
    if (type === 'err') {
      passEl.style.animation = 'shake 0.3s ease';
      setTimeout(() => passEl.style.animation = '', 400);
    }
  }

  btnEl.addEventListener('click', doAuth);
  passEl.addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(); });

  // 이미 로그인된 세션 확인
  sb.auth.getSession().then(({ data }) => {
    if (data.session) {
      currentUser = data.session.user;
      screen.style.display = 'none';
      onLoggedIn();
    } else {
      setTimeout(() => emailEl.focus(), 100);

  // 로그아웃
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    if (!confirm('로그아웃 할까요?')) return;
    await sb.auth.signOut();
    currentUser = null;
    screen.style.display = 'flex';

    setMode('login');

})();

function onLoggedIn() {
  // 로그인 후 앱 초기화

}

let tasks = {};
let gratitudes = {};   // { 'YYYY-MM-DD': [{id, text},...] }
let viewYear, viewMonth, selectedDate, currentFilter = 'all';
const today    = new Date();
const toKey    = (y,m,d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const todayKey = toKey(today.getFullYear(), today.getMonth(), today.getDate());

function setSyncState(state, msg) {
  document.getElementById('syncIndicator').className = 'sync-indicator ' + state;
  document.getElementById('syncText').textContent = msg;
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── INIT ────────────────────────────────────
async function initApp() {
  viewYear = today.getFullYear();
  viewMonth = today.getMonth();
  selectedDate = todayKey;

  document.getElementById('headerDate').textContent =
    today.toLocaleDateString('ko-KR', {weekday:'long',year:'numeric',month:'long',day:'numeric'});

  // 기간 토글
  document.getElementById('rangeToggleBtn').addEventListener('click', () => {
    const on = document.getElementById('rangeRow').classList.toggle('visible');
    document.getElementById('rangeToggleBtn').classList.toggle('active', on);
    if (on) {
      const s = new Date(today), e = new Date(today); e.setDate(e.getDate()+6);
      document.getElementById('rangeStart').value = s.toISOString().slice(0,10);
      document.getElementById('rangeEnd').value   = e.toISOString().slice(0,10);
    }
  });

  document.getElementById('prevMonth').addEventListener('click', async () => {
    viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;}
    renderCalendar(); await loadMonth(viewYear, viewMonth);
  });
  document.getElementById('nextMonth').addEventListener('click', async () => {
    viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;}
    renderCalendar(); await loadMonth(viewYear, viewMonth);
  });
  document.getElementById('addBtn').addEventListener('click', addTask);
  document.getElementById('taskInput').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });
  document.getElementById('rangeAddBtn').addEventListener('click', addRangeTasks);
  document.getElementById('gratitudeAddBtn').addEventListener('click', addGratitude);
  document.getElementById('gratitudeInput').addEventListener('keydown', e => { if(e.key==='Enter') addGratitude(); });

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      renderTasks();
    });
  });

  renderCalendar();
  await loadMonth(viewYear, viewMonth);
  await carryOverIncompleteTasks();
  await loadGratitudes();
  renderGratitudeDate();
  renderGratitudeList();
  calcStreak();
}

// ── CARRY OVER 미완료 일정 ────────────────────
async function carryOverIncompleteTasks() {
  // 오늘 이미 이월한 적 있으면 스킵 (중복 방지)
  const lastCarry = localStorage.getItem('lastCarryDate');
  if (lastCarry === todayKey) return;

  setSyncState('syncing', '미완료 이월 중');

  // 오늘 이전의 미완료 일정 조회 (기간 일정 제외)
  const yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayKey = yesterday.toISOString().slice(0, 10);

  const { data, error } = await sb.from('tasks').select('*')
    .eq('done', false)
    .eq('date', yesterdayKey)
    .is('range_id', null)
    .eq('user_id', currentUser.id);

  if (error) { console.error(error); return; }
  if (!data || data.length === 0) {
    localStorage.setItem('lastCarryDate', todayKey);
    return;
  }

  // 오늘 날짜에 이미 같은 제목이 있는지 확인 (중복 방지)
  const todayTasks = tasks[todayKey] || [];
  const todayTitles = new Set(todayTasks.map(t => t.title));

  const toInsert = data
    .filter(t => !todayTitles.has(t.title))
    .map(t => ({
      date: todayKey,
      title: t.title,
      time: t.time,
      priority: t.priority,
      done: false,
      range_id: null,
      user_id: currentUser.id
    }));

  if (toInsert.length === 0) {
    localStorage.setItem('lastCarryDate', todayKey);
    setSyncState('synced', '동기화됨');
    return;
  }

  const { data: inserted, error: insertErr } = await sb.from('tasks')
    .insert(toInsert).select();

  if (insertErr) { console.error(insertErr); return; }

  // 로컬 state 업데이트
  inserted.forEach(t => {
    if (!tasks[t.date]) tasks[t.date] = [];
    tasks[t.date].push(t);
  });

  localStorage.setItem('lastCarryDate', todayKey);
  setSyncState('synced', `${inserted.length}개 이월됨`);
  setTimeout(() => setSyncState('synced', '동기화됨'), 2500);
  renderCalendar(); renderTasks(); updateStats();
}

// ── TASKS DATA ───────────────────────────────
async function loadMonth(y, m) {
  setSyncState('syncing', '동기화 중');
  const from = `${y}-${String(m+1).padStart(2,'0')}-01`;
  const to   = `${y}-${String(m+1).padStart(2,'0')}-31`;
  const { data, error } = await sb.from('tasks').select('*')
    .gte('date', from).lte('date', to).order('time', {ascending:true, nullsFirst:false});
  if (error) { setSyncState('error', '오류'); console.error(error); return; }
  for (let d=1; d<=31; d++) tasks[`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`] = [];
  data.forEach(t => { if(!tasks[t.date]) tasks[t.date]=[]; tasks[t.date].push(t); });
  setSyncState('synced', '동기화됨');
  renderCalendar(); renderTasks(); updateStats();
}

async function addTask() {
  const input = document.getElementById('taskInput');
  const title = input.value.trim();
  if (!title) return;
  const time     = document.getElementById('timeInput').value || null;
  const priority = document.getElementById('prioritySelect').value;
  document.getElementById('addBtn').disabled = true;
  setSyncState('syncing', '저장 중');
  const { data, error } = await sb.from('tasks')
    .insert({ date:selectedDate, title, time, priority, done:false, range_id:null, user_id:currentUser.id })
    .select().single();
  document.getElementById('addBtn').disabled = false;
  if (error) { setSyncState('error', '저장 실패'); console.error(error); return; }
  if (!tasks[selectedDate]) tasks[selectedDate] = [];
  tasks[selectedDate].push(data);
  input.value = '';
  setSyncState('synced', '동기화됨');
  renderCalendar(); renderTasks(); updateStats();
}

async function addRangeTasks() {
  const title = document.getElementById('taskInput').value.trim();
  if (!title) { document.getElementById('taskInput').focus(); return; }
  const startStr = document.getElementById('rangeStart').value;
  const endStr   = document.getElementById('rangeEnd').value;
  if (!startStr || !endStr) return;
  const start = new Date(startStr), end = new Date(endStr);
  if (end < start) { alert('종료일이 시작일보다 앞입니다.'); return; }
  const diffDays = Math.round((end - start) / 86400000) + 1;
  if (diffDays > 365) { alert('최대 365일까지 가능합니다.'); return; }
  const time = document.getElementById('timeInput').value || null;
  const priority = document.getElementById('prioritySelect').value;
  const rangeId = `range_${Date.now()}`;
  document.getElementById('rangeAddBtn').disabled = true;
  setSyncState('syncing', `0/${diffDays} 저장 중`);
  const rows = [];
  for (let i=0; i<diffDays; i++) {
    const d = new Date(start); d.setDate(d.getDate()+i);
    rows.push({ date: d.toISOString().slice(0,10), title, time, priority, done:false, range_id:rangeId, user_id:currentUser.id });
  }
  const BATCH = 50;
  let inserted = [];
  for (let i=0; i<rows.length; i+=BATCH) {
    const { data, error } = await sb.from('tasks').insert(rows.slice(i,i+BATCH)).select();
    if (error) { setSyncState('error', '저장 실패'); document.getElementById('rangeAddBtn').disabled=false; return; }
    inserted = inserted.concat(data);
    setSyncState('syncing', `${Math.min(i+BATCH,rows.length)}/${diffDays} 저장 중`);
  }
  inserted.forEach(t => { if(!tasks[t.date]) tasks[t.date]=[]; tasks[t.date].push(t); });
  document.getElementById('taskInput').value = '';
  document.getElementById('rangeAddBtn').disabled = false;
  setSyncState('synced', `${diffDays}일 추가됨`);
  setTimeout(()=>setSyncState('synced','동기화됨'), 2000);
  renderCalendar(); renderTasks(); updateStats();
}

async function toggleDone(id) {
  const task = Object.values(tasks).flat().find(t => t.id===id);
  if (!task) return;
  const { error } = await sb.from('tasks').update({ done:!task.done }).eq('id', id);
  if (error) return;
  task.done = !task.done;
  setSyncState('synced', '동기화됨');
  renderTasks(); updateStats();
}

async function deleteTask(id) {
  const { error } = await sb.from('tasks').delete().eq('id', id);
  if (error) return;
  for (const k in tasks) tasks[k] = tasks[k].filter(t => t.id!==id);
  setSyncState('synced', '동기화됨');
  renderCalendar(); renderTasks(); updateStats();
}

async function deleteRangeTasks(rangeId) {
  if (!confirm('이 기간 일정을 전체 삭제할까요?')) return;
  const { error } = await sb.from('tasks').delete().eq('range_id', rangeId);
  if (error) return;
  for (const k in tasks) tasks[k] = tasks[k].filter(t => t.range_id!==rangeId);
  setSyncState('synced', '동기화됨');
  renderCalendar(); renderTasks(); updateStats();
}

// ── GRATITUDE DATA ───────────────────────────
async function loadGratitudes() {
  const { data, error } = await sb.from('gratitudes').select('*').order('created_at', {ascending:true});
  if (error) { console.error(error); return; }
  gratitudes = {};
  data.forEach(g => {
    if (!gratitudes[g.date]) gratitudes[g.date] = [];
    gratitudes[g.date].push(g);
  });
}

async function addGratitude() {
  const input = document.getElementById('gratitudeInput');
  const text = input.value.trim();
  if (!text) return;
  const dayG = gratitudes[selectedDate] || [];
  if (dayG.length >= 3) return;
  document.getElementById('gratitudeAddBtn').disabled = true;
  setSyncState('syncing', '저장 중');
  const { data, error } = await sb.from('gratitudes')
    .insert({ date: selectedDate, text, user_id: currentUser.id })
    .select().single();
  document.getElementById('gratitudeAddBtn').disabled = false;
  if (error) { setSyncState('error', '저장 실패'); console.error(error); return; }
  if (!gratitudes[selectedDate]) gratitudes[selectedDate] = [];
  gratitudes[selectedDate].push(data);
  input.value = '';
  setSyncState('synced', '동기화됨');
  renderGratitudeList();
  calcStreak();
}

async function deleteGratitude(id) {
  const { error } = await sb.from('gratitudes').delete().eq('id', id);
  if (error) return;
  for (const k in gratitudes) gratitudes[k] = gratitudes[k].filter(g => g.id !== id);
  renderGratitudeList();
  calcStreak();
}

// ── GRATITUDE RENDER ─────────────────────────
function renderGratitudeDate() {
  const [sy,sm,sd] = selectedDate.split('-').map(Number);
  const dt = new Date(sy, sm-1, sd);
  const isToday = selectedDate === todayKey;
  document.getElementById('gratitudeDate').textContent =
    isToday ? '오늘 · ' + dt.toLocaleDateString('ko-KR',{month:'long',day:'numeric'})
             : dt.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
}

function renderGratitudeList() {
  const list = document.getElementById('gratitudeList');
  const dayG = gratitudes[selectedDate] || [];
  list.innerHTML = '';

  if (dayG.length === 0) {
    list.innerHTML = `
      <div class="gratitude-empty">
        <div class="icon">🌱</div>
        <p>오늘 감사한 것을<br>적어보세요</p>
      </div>`;
    return;
  }

  const emojis = ['🌟','✨','💫'];
  dayG.forEach((g, i) => {
    const item = document.createElement('div');
    item.className = 'gratitude-item';
    item.innerHTML = `
      <span class="gratitude-num">${emojis[i]||'•'}</span>
      <span class="gratitude-text">${escHtml(g.text)}</span>
      <button class="gratitude-del" title="삭제">✕</button>`;
    item.querySelector('.gratitude-del').addEventListener('click', () => deleteGratitude(g.id));
    list.appendChild(item);
  });

  // 남은 슬롯 표시
  for (let i=dayG.length; i<3; i++) {
    const slot = document.createElement('div');
    slot.className = 'gratitude-item';
    slot.style.opacity = '0.3';
    slot.style.borderLeftColor = 'var(--border)';
    slot.innerHTML = `<span class="gratitude-num" style="opacity:0.4">${emojis[i]}</span><span class="gratitude-text" style="color:var(--text-dim);font-size:0.78rem;">감사한 것 ${i+1}번째...</span>`;
    list.appendChild(slot);
  }
}

function calcStreak() {
  // 연속으로 감사일기를 쓴 날 계산
  let streak = 0;
  const d = new Date(todayKey);
  while (true) {
    const k = d.toISOString().slice(0,10);
    if (gratitudes[k] && gratitudes[k].length > 0) {
      streak++;
      d.setDate(d.getDate()-1);
    } else break;
  }
  document.getElementById('streakNum').textContent = streak + '일';
}

// ── CALENDAR ────────────────────────────────
function renderCalendar() {
  document.getElementById('calMonthLabel').textContent = `${viewYear}년 ${viewMonth+1}월`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['일','월','화','수','목','금','토'].forEach(d => {
    const el = document.createElement('div'); el.className='cal-day-label'; el.textContent=d; grid.appendChild(el);
  });
  const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const daysInPrev  = new Date(viewYear, viewMonth, 0).getDate();
  for (let i=0; i<firstDay; i++) grid.appendChild(makeCell(viewYear, viewMonth-1, daysInPrev-firstDay+1+i, true));
  for (let d=1; d<=daysInMonth; d++) grid.appendChild(makeCell(viewYear, viewMonth, d, false));
  const rem = (firstDay+daysInMonth)%7;
  for (let d=1; d<=(rem===0?0:7-rem); d++) grid.appendChild(makeCell(viewYear, viewMonth+1, d, true));
}

function makeCell(y, m, d, other) {
  const cell = document.createElement('div'); cell.className='cal-cell';
  let ry=y, rm=m;
  if(m<0){ry--;rm=11;} if(m>11){ry++;rm=0;}
  const key = toKey(ry, rm, d);
  cell.textContent = d;
  if (other) cell.classList.add('other-month');
  if (key===todayKey) cell.classList.add('today');
  if (key===selectedDate) cell.classList.add('selected');
  if (tasks[key]&&tasks[key].length>0) cell.classList.add('has-tasks');
  cell.addEventListener('click', () => {
    selectedDate=key; renderCalendar(); renderTasks(); updateStats();
    updateDateLabel(); renderGratitudeDate(); renderGratitudeList();
  });
  return cell;
}

function updateDateLabel() {
  const [sy,sm,sd] = selectedDate.split('-').map(Number);
  const dt = new Date(sy, sm-1, sd);
  const isToday = selectedDate===todayKey;
  const weekday = dt.toLocaleDateString('ko-KR',{weekday:'long'});
  const dateStr = dt.toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
  document.getElementById('selectedDateLabel').childNodes[0].textContent = isToday ? '오늘 ' : dateStr+' ';
  document.getElementById('selectedDateSub').textContent = isToday ? dateStr+' '+weekday : weekday;
}

// ── TASKS RENDER ─────────────────────────────
function renderTasks() {
  const list = document.getElementById('taskList');
  const all  = tasks[selectedDate] || [];
  const pMap = {high:'p-high',mid:'p-mid',low:'p-low'};
  let filtered = all;
  if (currentFilter==='todo')  filtered = all.filter(t=>!t.done);
  else if (currentFilter==='done')  filtered = all.filter(t=>t.done);
  else if (currentFilter==='high')  filtered = all.filter(t=>t.priority==='high');
  else if (currentFilter==='range') filtered = all.filter(t=>t.range_id);
  filtered = [...filtered].sort((a,b) => {
    if (a.done!==b.done) return a.done?1:-1;
    if (a.time&&b.time) return a.time.localeCompare(b.time);
    if (a.time) return -1; if(b.time) return 1; return 0;
  });
  if (filtered.length===0) {
    list.innerHTML=`<div class="empty-state"><div class="icon">📋</div><p>일정이 없습니다</p></div>`; return;
  }
  list.innerHTML='';
  filtered.forEach(task => {
    const item = document.createElement('div');
    item.className = 'task-item'+(task.done?' done':'')+(task.range_id?' is-range':'');
    item.innerHTML = `
      <button class="check-btn">${task.done?'✓':''}</button>
      <div class="priority-dot ${pMap[task.priority]||'p-low'}"></div>
      <div class="task-info">
        <div class="task-title">${escHtml(task.title)}</div>
        <div class="task-meta">
          ${task.time?`<span class="task-time">⏰ ${task.time}</span>`:''}
          ${task.range_id?`<span class="range-badge">📅 기간</span>`:''}
        </div>
      </div>
      <div class="task-actions">
        ${task.range_id?`<button class="action-btn del-range-btn" title="기간 전체 삭제">📅✕</button>`:''}
        <button class="action-btn del-btn" title="삭제">✕</button>
      </div>`;
    item.querySelector('.check-btn').addEventListener('click', ()=>toggleDone(task.id));
    item.querySelector('.del-btn').addEventListener('click', ()=>deleteTask(task.id));
    if (task.range_id) item.querySelector('.del-range-btn').addEventListener('click', ()=>deleteRangeTasks(task.range_id));
    list.appendChild(item);
  });
  updateDateLabel();
}

function updateStats() {
  const all=tasks[selectedDate]||[]; const done=all.filter(t=>t.done).length;
  document.getElementById('statTotal').textContent=all.length;
  document.getElementById('statDone').textContent=done;
  document.getElementById('statLeft').textContent=all.length-done;
}
</script>
</body>
</html>
